version: "3.9"
services:
  neo4j:
    image: neo4j:5.15-community
    ports: ["7474:7474", "7687:7687"]
    environment:
      NEO4J_AUTH: neo4j/kernelsentinel123
    volumes: ["neo4j_data:/data"]

  chromadb:
    image: chromadb/chroma:0.4.22
    ports: ["8000:8000"]
    volumes: ["chroma_data:/chroma/chroma"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

volumes:
  neo4j_data:
  chroma_data:
